services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - app

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-typingcoach}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-typingcoach}
      POSTGRES_DB: ${POSTGRES_DB:-typingcoach}
      MONGODB_URI: mongodb://mongo:27017
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    depends_on:
      - postgres
      - mongo
    networks:
      - app

  postgres:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-typingcoach}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-typingcoach}
      POSTGRES_DB: ${POSTGRES_DB:-typingcoach}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app

volumes:
  postgres_data:
  mongo_data:

networks:
  app:
    driver: bridge
